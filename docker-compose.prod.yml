name: lazyops

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lazyops}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-lazyops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lazyops_net
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ${BACKEND_IMAGE:-tawn/lazyops-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      GIN_MODE: ${GIN_MODE:-release}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      AGENT_DEFAULT_IMAGE: ${AGENT_DEFAULT_IMAGE:-tawn/lazyops-agent:latest}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - lazyops_net
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${FRONTEND_IMAGE:-tawn/lazyops-frontend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8080}
      NEXT_PUBLIC_MOCK_MODE: ${NEXT_PUBLIC_MOCK_MODE:-false}
      NEXT_PUBLIC_AGENT_IMAGE_DEFAULT: ${NEXT_PUBLIC_AGENT_IMAGE_DEFAULT:-tawn/lazyops-agent:latest}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - lazyops_net
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  build-worker:
    image: ${BACKEND_IMAGE:-tawn/lazyops-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    entrypoint: ["/app/lazyops-build-worker"]
    user: "0:0"
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      BUILD_WORKER_ENABLED: ${BUILD_WORKER_ENABLED:-false}
      BUILD_WORKER_POLL_INTERVAL: ${BUILD_WORKER_POLL_INTERVAL:-5s}
      BUILD_WORKER_MAX_CONCURRENCY: ${BUILD_WORKER_MAX_CONCURRENCY:-1}
      BUILD_REGISTRY_HOST: ${BUILD_REGISTRY_HOST:-}
      BUILD_REGISTRY_USER: ${BUILD_REGISTRY_USER:-}
      BUILD_REGISTRY_PASS: ${BUILD_REGISTRY_PASS:-}
      BUILD_NIXPACKS_BIN: ${BUILD_NIXPACKS_BIN:-nixpacks}
      BUILD_DOCKER_BIN: ${BUILD_DOCKER_BIN:-docker}
      DOCKER_BUILDKIT: "0"
      BUILD_WORKSPACE_DIR: ${BUILD_WORKSPACE_DIR:-/tmp}
      BUILD_WORKER_CALLBACK_BASE_URL: ${BUILD_WORKER_CALLBACK_BASE_URL:-http://backend:8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - lazyops_net
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./nginx.config:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    networks:
      - lazyops_net
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # Optional local agent on control-plane VPS.
  # Most production setups should bootstrap agents on user VPS via SSH from the dashboard.
  agent:
    image: ${AGENT_IMAGE:-tawn/lazyops-agent}:${AGENT_IMAGE_TAG:-latest}
    restart: unless-stopped
    profiles: ["local-agent"]
    env_file:
      - ./.env
    environment:
      AGENT_APP_ENV: ${AGENT_APP_ENV:-production}
      AGENT_LOG_LEVEL: ${AGENT_LOG_LEVEL:-info}
      AGENT_RUNTIME_MODE: ${AGENT_RUNTIME_MODE:-standalone}
      AGENT_KIND: ${AGENT_KIND:-instance_agent}
      AGENT_TARGET_REF: ${AGENT_TARGET_REF:-control-plane}
      AGENT_CONTROL_PLANE_URL: ${AGENT_CONTROL_PLANE_URL:-ws://backend:8080}
      AGENT_USE_MOCK_CONTROL: ${AGENT_USE_MOCK_CONTROL:-false}
      AGENT_STATE_DIR: /var/lib/lazyops-agent/state
      AGENT_RUNTIME_ROOT_DIR: /var/lib/lazyops-agent/runtime
      AGENT_STATE_ENCRYPTION_KEY: ${AGENT_STATE_ENCRYPTION_KEY:-}
      AGENT_BOOTSTRAP_TOKEN: ${AGENT_BOOTSTRAP_TOKEN:-}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - agent_state:/var/lib/lazyops-agent
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: host
    privileged: true
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  agent_state:
  build_workspace:

networks:
  lazyops_net:
    driver: bridge
