app:
  name: lazyops-server
  environment: development

server:
  host: 0.0.0.0
  port: 8080
  gin_mode: debug

database:
  host: 127.0.0.1
  port: 5432
  user: postgres
  password: postgres
  name: lazyops
  sslmode: disable
  timezone: Asia/Bangkok

jwt:
  issuer: lazyops-server
  expires_in: 24h

security:
  allowed_origins:
    - "*"
  rate_limit_rps: 10
  rate_limit_burst: 20

seed:
  admin_email: admin@lazyops.local
  admin_name: System Admin

websocket:
  ping_period: 30s
  pong_wait: 60s
