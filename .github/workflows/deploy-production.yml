name: deploy-production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (latest, sha-<commit>, vX.Y.Z)"
        required: true
        default: "latest"
        type: string
      git_ref:
        description: "Git ref to pull on VPS"
        required: true
        default: "main"
        type: string
      run_local_agent:
        description: "Also run local agent service on control-plane VPS"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy Over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          GIT_REF: ${{ inputs.git_ref }}
          RUN_LOCAL_AGENT: ${{ inputs.run_local_agent }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          envs: IMAGE_TAG,GIT_REF,RUN_LOCAL_AGENT,DOCKER_USERNAME,DOCKER_TOKEN
          script: |
            set -Eeuo pipefail
            trap 'echo "[deploy] failed at line $LINENO"' ERR
            set -x

            cd ~/lazyops

            if [ -d .git ]; then
              git pull --ff-only origin "$GIT_REF"
            fi

            test -f .env
            test -f docker-compose.prod.yml
            test -f nginx.config

            echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
            export IMAGE_TAG

            if docker compose version >/dev/null 2>&1; then
              compose() { docker compose "$@"; }
            elif command -v docker-compose >/dev/null 2>&1; then
              compose() { docker-compose "$@"; }
            else
              echo "Docker Compose is not installed on VPS"
              exit 1
            fi

            compose -f docker-compose.prod.yml config >/dev/null

            case "${RUN_LOCAL_AGENT}" in
              true)
                compose -f docker-compose.prod.yml --profile local-agent pull
                compose -f docker-compose.prod.yml --profile local-agent up -d --remove-orphans
                ;;
              false|"")
                compose -f docker-compose.prod.yml pull
                compose -f docker-compose.prod.yml up -d --remove-orphans
                ;;
              *)
                echo "Invalid RUN_LOCAL_AGENT value: ${RUN_LOCAL_AGENT}"
                exit 1
                ;;
            esac

            compose -f docker-compose.prod.yml ps
